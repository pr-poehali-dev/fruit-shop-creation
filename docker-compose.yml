version: "3.9"

# ─── РЕЖИМЫ ЗАПУСКА ──────────────────────────────────────────────────────────
#
#  Без домена (только IP):
#    docker compose up -d --build
#    Сайт: http://ВАШ_IP
#
#  С доменом + HTTPS (автоматический SSL):
#    DOMAIN=myshop.ru ACME_EMAIL=you@email.com docker compose \
#      --profile https up -d --build
#    Сайт: https://myshop.ru
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Traefik — автоматический HTTPS (только при --profile https) ────────────
  traefik:
    image: traefik:v3.0
    container_name: nursery_traefik
    profiles: ["https"]
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt_data:/letsencrypt"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nursery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nursery
      POSTGRES_USER: nursery_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nursery_user -d nursery"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO — хранилище файлов ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nursery_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO инициализация bucket ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: nursery_storage_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/files;
      mc anonymous set download local/files;
      exit 0;
      "

  # ── Миграции базы данных ───────────────────────────────────────────────────
  migrations:
    image: python:3.11-slim
    container_name: nursery_migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nursery_user:${POSTGRES_PASSWORD}@postgres:5432/nursery
    volumes:
      - ./db_migrations:/migrations:ro
      - ./docker/run-migrations.py:/run-migrations.py:ro
    command: >
      sh -c "pip install psycopg2-binary -q && python /run-migrations.py"
    restart: on-failure

  # ── Backend — Python API ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: nursery_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://nursery_user:${POSTGRES_PASSWORD}@postgres:5432/nursery
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://${SERVER_HOST:-localhost}:9000}
      ALFABANK_API_TOKEN: ${ALFABANK_API_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_TELEGRAM_CHAT_ID: ${ADMIN_TELEGRAM_CHAT_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ADMIN_CODE: ${ADMIN_CODE:-}
    expose:
      - "8000"
    # HTTPS-метки для Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend.middlewares=strip-api"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  # ── Frontend — React + Nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        # Если профиль https — API через /api на том же домене
        # Если без домена — прямой URL на порт 8000
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://${SERVER_HOST:-localhost}:8000}
    container_name: nursery_frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Порт — только когда БЕЗ https-профиля
    ports:
      - "${FRONTEND_PORT:-80}:80"
    # HTTPS-метки для Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

volumes:
  postgres_data:
  minio_data:
  letsencrypt_data:
