version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: nursery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nursery
      POSTGRES_USER: nursery_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nursery_user -d nursery"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: nursery_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: nursery_storage_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/files;
      mc anonymous set download local/files;
      exit 0;
      "

  migrations:
    image: python:3.11-slim
    container_name: nursery_migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nursery_user:${POSTGRES_PASSWORD}@postgres:5432/nursery
    volumes:
      - ./db_migrations:/migrations:ro
      - ./docker/run-migrations.py:/run-migrations.py:ro
    command: python /run-migrations.py
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: nursery_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://nursery_user:${POSTGRES_PASSWORD}@postgres:5432/nursery
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: http://${SERVER_HOST:-localhost}:9000
      ALFABANK_API_TOKEN: ${ALFABANK_API_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_TELEGRAM_CHAT_ID: ${ADMIN_TELEGRAM_CHAT_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ADMIN_CODE: ${ADMIN_CODE:-}
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://${SERVER_HOST:-localhost}:8000
    container_name: nursery_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
  minio_data:
